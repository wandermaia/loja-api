# .github/workflows/ci.yml
name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'tests/**'
      - 'Dockerfile'
      - 'requirements*.txt'
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint-and-sast:
    name: Lint e SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install ruff bandit

      - name: Lint com Ruff
        run: ruff check app/

      - name: SAST com Bandit
        run: bandit -r app/ -ll

  unit-tests:
    name: Testes Unitários
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements-dev.txt

      - name: Executar testes
        run: pytest tests/unit/ -v --tb=short

  build-and-push:
    name: Build e Publish
    runs-on: ubuntu-latest
    needs: [lint-and-sast, unit-tests]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-gitops:
    name: Atualizar Manifests GitOps
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout do repositório de infra
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/loja-infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: loja-infra

      - name: Instalar kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Atualizar tag da imagem
        run: |
          cd loja-infra/apps/loja-api/overlays/staging
          kustomize edit set image \
            ghcr.io/${{ github.repository_owner }}/loja-api=ghcr.io/${{ github.repository_owner }}/loja-api:${{ github.sha }}
          git config user.email "ci@github-actions"
          git config user.name "GitHub Actions"
          git add .
          git commit -m "ci: atualiza loja-api para ${{ github.sha }}"
          git push
